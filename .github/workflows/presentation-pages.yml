name: Deploy Presentation

on:
  push:
    branches:
      - main
    paths:
      - "apps/presentation/**"
      - "scripts/check-presentation.js"
      - "scripts/check-presentation-release.js"
      - "scripts/verify-gemini-image-access.js"
      - "package.json"
      - ".github/workflows/presentation-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: presentation-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install presentation dependencies
        run: npm install --prefix apps/presentation

      - name: Validate deck structure
        run: npm run presentation:check

      - name: Validate publish readiness
        run: npm run presentation:release:check

      - name: Build presentation
        run: npm run presentation:build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload presentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/presentation/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
