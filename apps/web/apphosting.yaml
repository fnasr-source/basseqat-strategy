runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_BASE_URL
    value: https://[CLIENT_SLUG].example.com
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: [CLIENT_SLUG]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: [CLIENT_SLUG].firebaseapp.com
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: [CLIENT_SLUG].firebasestorage.app
  - variable: NEXT_TELEMETRY_DISABLED
    value: "1"
  - variable: NEXT_TURBOPACK
    value: "0"
